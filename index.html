<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trie Dictionary</title>

<style>

body{
    font-family: Arial;
    padding:40px;
    background:#f4f4f4;
}

input{
    padding:8px;
    width:250px;
}

pre{
    background:white;
    padding:20px;
    border-radius:5px;
    margin-top:20px;
}

</style>

</head>

<body>

<h2>Dictionary Search</h2>

<input id="prefix" placeholder="Enter word..." autocomplete="off"/>

<pre id="result">Result will appear here...</pre>

<script>

const box = document.getElementById("prefix");
const result = document.getElementById("result");

let timer;

box.addEventListener("input", () => {

    clearTimeout(timer);
    timer = setTimeout(search,200);

});

async function search(){

    const prefix = box.value;

    if(prefix.length === 0){
        result.textContent="";
        return;
    }

    const response = await fetch("/search",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({input:prefix})
    });

    const data = await response.json();

    result.textContent = data.result;

}

</script>

</body>
</html>
